<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Attributes HTML 5</legend>
        <form>
            First Name:
            <input type="text" name="firstname" placeholder="Enter First Name" required>
            <br><br>
            Last Name:
            <input type="text" name="lastname" maxlength="10" autofocus="true">
            <br><br>
            Email:
            <input type="email" name="email" value="demo@gss.com" readonly>
            <br><br>
            Alternate Email:
            <input type="email" name="email" value="demo@gss.com" disabled>
            <br><br>
            Age:
            <input type="number" name="age" min="18" max="60">
            <br><br>
            <input type="submit"></input>
            <input type="reset"></input>
        </form>
    </fieldset>
</body>
</html>
